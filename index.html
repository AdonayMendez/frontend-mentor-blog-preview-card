<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="index.css">
  
  <title>Frontend Mentor | Blog preview card</title>


</head>
<body>
  <div class="blog-card-container">
    <div class="blog-img-container">
      <img src = 'assets/images/illustration-article.svg'>
    </div>
    <div class="blog-body-container">
      <div class="blog-card-tag"><p>Learning</p></div>
      <p class="blog-card-date">Published 21 Dec 2023</p>
      <h2 class="blog-card-title">HTML & CSS foundations </h2>
      <p class="blog-card-description"> 
        These languages are the backbone of every website,
        defining structure, content, and presentation.
      </p>
      <div class="blog-card-user">
        <img src = "assets/images/image-avatar.webp">
        <p>Greg Hooper</p>
      </div>
    </div>

  </div>
</body>
</html>
